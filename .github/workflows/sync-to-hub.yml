name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to hub
        uses: huggingface/hub-sync@v1
        with:
          repo: spaces/ElaHmi/zaytuna_model
          token: ${{ secrets.HF_TOKEN }}
          force: true

